trigger: none
pr: none

pool:
  name: Default

variables:
- group: SmarterASP-Secrets 

steps:
- task: UseDotNet@2
  displayName: 'Setup .NET Core SDK 8.0'
  inputs:
    packageType: 'sdk'
    version: '8.0.x'

- script: |
    dotnet new tool-manifest --force
    dotnet tool install dotnet-ef --version 8.*
  displayName: 'Install EF Core Tools Locally'

- script: |
    dotnet restore HttpLab.sln
  displayName: 'Restore NuGet Packages via Solution'

- script: |
    dotnet add HttpLab.csproj package Microsoft.EntityFrameworkCore.Design
  displayName: 'Add EF Core Design Package'

- script: |
    dotnet tool run dotnet-ef database update --project HttpLab.csproj --startup-project HttpLab.csproj --connection "$(DB_CONNECTION_STRING)"
  displayName: 'Apply Database Migrations'

- script: |
    dotnet publish HttpLab.sln --configuration Release --output $(Build.SourcesDirectory)/publish
  displayName: 'Build and Publish Solution'

- task: FtpUpload@2
  displayName: 'Upload Files to SmarterASP via FTP'
  inputs:
    credentialsOption: 'inputs'
    serverUrl: 'ftp://win9079.site4now.net'
    username: 'faisal0101-001'
    password: '$(FTP_PASSWORD)'
    rootDirectory: '$(Build.SourcesDirectory)/publish'
    remoteDirectory: '/site1/'
    clean: false
    preservePaths: true