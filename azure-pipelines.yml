trigger:
  - main

pool:
  name: Default  

variables:
- group: SmarterASP-Secrets 

steps:
- task: UseDotNet@2
  displayName: 'Setup .NET Core SDK 8.0'
  inputs:
    packageType: 'sdk'
    version: '8.0.x'

- script: |
    dotnet tool install --global dotnet-ef --version 8.*
  displayName: 'Install EF Core Tools'
  continueOnError: true

- script: |
    dotnet add ./HttpLab.csproj package Microsoft.EntityFrameworkCore.Design
  displayName: 'Add EF Core Design Package'

- script: |
    dotnet restore ./HttpLab.csproj
  displayName: 'Restore NuGet Packages'

- script: |
    dotnet ef database update --project ./HttpLab.csproj --startup-project ./HttpLab.csproj --connection "$(DB_CONNECTION_STRING)"
  displayName: 'Apply Database Migrations'

- script: |
    dotnet publish ./HttpLab.csproj --configuration Release --output $(Build.SourcesDirectory)/publish
  displayName: 'Build and Publish Application'

- task: FtpUpload@2
  displayName: 'Upload Files to SmarterASP via FTP'
  inputs:
    credentialsOption: 'inputs'
    serverUrl: 'ftp://win9079.site4now.net'
    username: 'faisal0101-001'
    password: '$(FTP_PASSWORD)'
    rootDirectory: '$(Build.SourcesDirectory)/publish'
    remoteDirectory: '/site1/'
    clean: false
    preservePaths: true