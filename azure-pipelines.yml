trigger: none
pr: none

pool:
  name: Default

variables:
- group: SmarterASP-Secrets 

steps:
- script: |
    dotnet new tool-manifest --force
    dotnet tool install dotnet-ef --version 8.*
  displayName: 'Install EF Core Tools Locally'

- script: |
    dotnet restore HttpLab.csproj
  displayName: 'Restore NuGet Packages'

- script: |
    dotnet build HttpLab.csproj --configuration Release
  displayName: 'Build Project'

- script: |
    dotnet add HttpLab.csproj package Microsoft.EntityFrameworkCore.Design --version 8.0.11
  displayName: 'Add EF Core Design Package'

- script: |
    dotnet tool run dotnet-ef database update --project HttpLab.csproj --startup-project HttpLab.csproj --connection "$(DB_CONNECTION_STRING)"
  displayName: 'Apply Database Migrations'

- powershell: |
    # 1. Setup a clean static layout target path
    $staticPath = "$(Build.ArtifactStagingDirectory)/static"
    $wwwrootPath = "$staticPath/wwwroot"

    # 2. Force create the clean wwwroot subfolder layout
    if (-not (Test-Path -Path $wwwrootPath)) {
        New-Item -ItemType Directory -Force -Path $wwwrootPath | Out-Null
    }

    # 3. Direct route: Copy your source html directly into the staging subfolder
    Write-Host "Routing index.html directly to staging layout..."
    Copy-Item -Path "$(Build.SourcesDirectory)/wwwroot/index.html" -Destination "$wwwrootPath/" -Force -ErrorAction Stop
  displayName: 'Isolate and Stage Web App Structure'

- task: ArchiveFiles@2
  displayName: 'Zip Publish Output'
  inputs:
    rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/static'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/drop.zip'
    replaceExistingArchive: true

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact Box: drop'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/drop.zip'
    ArtifactName: 'drop'
    publishLocation: 'Container'