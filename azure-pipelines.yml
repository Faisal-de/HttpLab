trigger: none
pr: none

pool:
  name: Default

variables:
- group: SmarterASP-Secrets 

steps:
- script: |
    dotnet new tool-manifest --force
    dotnet tool  install dotnet-ef --version 8.*
  displayName: 'Install EF Core Tools Locally'

- script: |
    dotnet restore HttpLab.sln
  displayName: 'Restore NuGet Packages via Solution'

- script: |
    dotnet add HttpLab.csproj package Microsoft.EntityFrameworkCore.Design
  displayName: 'Add EF Core Design Package'

- script: |
    dotnet tool run dotnet-ef database update --project HttpLab.csproj --startup-project HttpLab.csproj --connection "$(DB_CONNECTION_STRING)"
  displayName: 'Apply Database Migrations'
- script: |
    dotnet publish HttpLab.csproj --configuration Release --output $(Build.ArtifactStagingDirectory)/publish /p:DeployOnBuild=true /p:WebPublishMethod=Package
  displayName: 'Build and Publish Solution'
# --- ENFORCED INDUSTRY COMPLIANT ARCHIVING TASK ---
- task: ArchiveFiles@2
  displayName: 'Zip Publish Output'
  inputs:
    rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/publish'
    includeRootFolder: true
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/drop.zip'
    replaceExistingArchive: true

# --- MODIFIED ARTIFACT STEP: UPLOADING THE COMPACT BOX ---
- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact Box: drop'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/drop.zip'
    ArtifactName: 'drop'
    publishLocation: 'Container'