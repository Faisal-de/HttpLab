trigger: none
pr: none

pool:
  name: Default

variables:
- group: SmarterASP-Secrets 

steps:
- script: |
    dotnet new tool-manifest --force
    dotnet tool install dotnet-ef --version 8.*
  displayName: 'Install EF Core Tools Locally'

- script: |
    dotnet restore HttpLab.csproj
  displayName: 'Restore NuGet Packages'

- script: |
    dotnet build HttpLab.csproj --configuration Release
  displayName: 'Build Project'

- script: |
    dotnet add HttpLab.csproj package Microsoft.EntityFrameworkCore.Design --version 8.0.11
  displayName: 'Add EF Core Design Package'

- script: |
    dotnet tool run dotnet-ef database update --project HttpLab.csproj --startup-project HttpLab.csproj --connection "$(DB_CONNECTION_STRING)"
  displayName: 'Apply Database Migrations'

- powershell: |
    # 1. Run standard compilation output
    dotnet publish HttpLab.csproj --configuration Release --output $(Build.ArtifactStagingDirectory)/publish

    # 2. Setup directory tracking
    $publishPath = "$(Build.ArtifactStagingDirectory)/publish"
    $wwwrootPath = "$publishPath/wwwroot"

    # 3. Create wwwroot if it doesn't already exist
    if (-not (Test-Path -Path $wwwrootPath)) {
        New-Item -ItemType Directory -Force -Path $wwwrootPath
    }

    # 4. Check if files are loose in root and move them inside wwwroot
    if (Test-Path -Path "$publishPath/index.html*") {
        Move-Item -Path "$publishPath/index.html*" -Destination "$wwwrootPath/"
    }
  displayName: 'Publish Solution Output and Structure Check'

- task: ArchiveFiles@2
  displayName: 'Zip Publish Output'
  inputs:
    rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/publish'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/drop.zip'
    replaceExistingArchive: true

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact Box: drop'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/drop.zip'
    ArtifactName: 'drop'
    publishLocation: 'Container'